<div class="hs-search-results">
  <template class="hs-search-results__template">
    <li>
      {% if module.display_featured_images %}
        <div class="hs-search-results__featured-image">
          <img src="">
        </div>
      {% endif %}
      <a href="#" class="hs-search-results__title">Content Title</a>
      <p class="hs-search-results__description">Description</p>
    </li>
  </template>
  <ul id="hsresults" class="hs-search-results__listing"></ul>
  <div class="hs-search-results__pagination" data-search-path="{{ request.path|escape_url }}">
    <a href="" class="hs-search-results__prev-page">&lt; {{ module.group_default_text.previous_page_link_text|escape_html }}</a>
    <a href="" class="hs-search-results__next-page">{{ module.group_default_text.next_page_link_text|escape_html }} &gt;</a>
  </div>
</div>

{% require_js position="head" %}
  <script data-search_results-config="config_{{ name|escape_attr }}" type="application/json">
  {
    "no_results_message": "{{ module.group_default_text.no_results_message|escapejson }}"
  }
  </script>
{% end_require_js %}
