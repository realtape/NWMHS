{% if module.meeting %}
  <div class="meetings-iframe-container" data-src="{{ module.meeting ~ '?embed=true'|escape_url }}" data-ab="{{ content.ab|escape_attr }}" data-ab-status="{{ content.abStatus|escape_attr }}" data-content-id="{{ content.id|escape_attr }}"></div>
  <script type="text/javascript" src="https://static.hsappstatic.net/MeetingsEmbed/ex/MeetingsEmbedCode.js" data-hs-ignore="true"></script>
{% else %}
<div class="hs-meetings-placeholder">
  <div class="hs-meetings-placeholder__inner">
    <h3 class="hs-meetings-placeholder__title">{{ module.select_meeting_title|sanitize_html("STRIP") }}</h3>
    <p class="hs-meetings-placeholder__description">{{ module.select_meeting_description|sanitize_html("STRIP") }}</p>
  </div>
</div>
{% endif %}
