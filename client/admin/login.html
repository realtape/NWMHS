<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NWMHS CRM — Login</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@700&family=Lato:wght@400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/app.css">
</head>
<body class="auth-page">

<div class="auth-card">
  <div class="auth-logo">
    <span style="font-family:var(--font-head);font-size:1.8rem;color:var(--navy);font-weight:700;">NWMHS <span style="color:var(--gold)">CRM</span></span>
  </div>

  <div class="auth-tabs">
    <div class="auth-tab active" data-tab="login">Sign In</div>
    <div class="auth-tab" data-tab="register">Create Account</div>
  </div>

  <!-- Login form -->
  <form id="login-form">
    <div class="form-group">
      <label>Email</label>
      <input type="email" name="email" placeholder="you@company.com" required autocomplete="email">
    </div>
    <div class="form-group">
      <label>Password</label>
      <input type="password" name="password" placeholder="••••••••" required autocomplete="current-password">
    </div>
    <div id="login-error" style="color:var(--danger);font-size:.85rem;margin-bottom:.75rem;display:none"></div>
    <button type="submit" class="btn btn--primary" style="width:100%;justify-content:center;">Sign In</button>
  </form>

  <!-- Register form -->
  <form id="register-form" style="display:none">
    <div class="form-group">
      <label>Company / Organization name</label>
      <input type="text" name="orgName" placeholder="Acme Corp" required>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Your full name</label>
        <input type="text" name="fullName" placeholder="Jane Doe" required>
      </div>
      <div class="form-group">
        <label>Email</label>
        <input type="email" name="email" placeholder="jane@acme.com" required autocomplete="email">
      </div>
    </div>
    <div class="form-group">
      <label>Password</label>
      <input type="password" name="password" placeholder="Min 8 characters" required minlength="8" autocomplete="new-password">
    </div>
    <div id="register-error" style="color:var(--danger);font-size:.85rem;margin-bottom:.75rem;display:none"></div>
    <button type="submit" class="btn btn--gold" style="width:100%;justify-content:center;">Create Account</button>
  </form>
</div>

<script src="js/api.js"></script>
<script>
  // Redirect if already logged in
  if (localStorage.getItem('crm_token')) window.location.href = 'dashboard.html';

  // Auto-open register tab from ?tab=register query param or sessionStorage
  const urlTab = new URLSearchParams(window.location.search).get('tab')
    || sessionStorage.getItem('crm_open_tab');
  if (urlTab === 'register') {
    sessionStorage.removeItem('crm_open_tab');
    document.querySelectorAll('.auth-tab').forEach(t => t.classList.remove('active'));
    document.querySelector('[data-tab="register"]').classList.add('active');
    document.getElementById('login-form').style.display    = 'none';
    document.getElementById('register-form').style.display = '';
  }

  // Tab switching
  document.querySelectorAll('.auth-tab').forEach(tab => {
    tab.addEventListener('click', () => {
      document.querySelectorAll('.auth-tab').forEach(t => t.classList.remove('active'));
      tab.classList.add('active');
      const which = tab.dataset.tab;
      document.getElementById('login-form').style.display    = which === 'login'    ? '' : 'none';
      document.getElementById('register-form').style.display = which === 'register' ? '' : 'none';
    });
  });

  // Login
  document.getElementById('login-form').addEventListener('submit', async e => {
    e.preventDefault();
    const btn = e.target.querySelector('button');
    const err = document.getElementById('login-error');
    btn.disabled = true; btn.textContent = 'Signing in…'; err.style.display = 'none';
    try {
      const data = Object.fromEntries(new FormData(e.target));
      const res  = await api.auth.login(data);
      saveSession(res.token, res.user);
      window.location.href = 'dashboard.html';
    } catch (ex) {
      err.textContent = ex.message; err.style.display = 'block';
      btn.disabled = false; btn.textContent = 'Sign In';
    }
  });

  // Register
  document.getElementById('register-form').addEventListener('submit', async e => {
    e.preventDefault();
    const btn = e.target.querySelector('button');
    const err = document.getElementById('register-error');
    btn.disabled = true; btn.textContent = 'Creating…'; err.style.display = 'none';
    try {
      const data = Object.fromEntries(new FormData(e.target));
      const res  = await api.auth.register(data);
      saveSession(res.token, { ...res.user, orgId: res.orgId });
      window.location.href = 'dashboard.html';
    } catch (ex) {
      err.textContent = ex.message; err.style.display = 'block';
      btn.disabled = false; btn.textContent = 'Create Account';
    }
  });
</script>
</body>
</html>
